name: Bug Report
description: Report a bug in Harbor
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Harbor Version
      description: "Which version of Harbor are you using? (check `harbor --version` or the app Settings page)"
      placeholder: "0.2.1"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where does the bug occur?
      options:
        - Desktop App
        - CLI
        - Gateway
        - Sync / Connectors
        - Marketplace
        - Vault
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `harbor dock ...`
        2. Run `harbor signal`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.3 (Apple Silicon)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages.
      render: shell
