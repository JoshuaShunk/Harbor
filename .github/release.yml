changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "Breaking Changes"
      labels: ["breaking-change"]
    - title: "New Features"
      labels: ["enhancement", "feature"]
    - title: "Bug Fixes"
      labels: ["bug", "fix"]
    - title: "Performance"
      labels: ["performance"]
    - title: "Security"
      labels: ["security"]
    - title: "Documentation"
      labels: ["documentation", "docs"]
    - title: "Dependencies"
      labels: ["dependencies"]
    - title: "Other Changes"
      labels: ["*"]
