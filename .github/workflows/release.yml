name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6
      - name: Create draft release
        id: create
        uses: actions/github-script@v6
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'Harbor ${{ github.ref_name }}',
              body: 'See the assets below to download Harbor for your platform.',
              draft: true,
              prerelease: false
            })
            return data.id

  cli:
    name: CLI (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Create placeholder for Tauri resource check
        run: mkdir -p crates/harbor-desktop/binaries && touch crates/harbor-desktop/binaries/harbor

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p harbor-cli

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../harbor-cli-${{ matrix.target }}.tar.gz harbor
          cd ../../..
          if command -v shasum >/dev/null; then
            shasum -a 256 harbor-cli-${{ matrix.target }}.tar.gz > harbor-cli-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum harbor-cli-${{ matrix.target }}.tar.gz > harbor-cli-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            harbor-cli-${{ matrix.target }}.tar.gz \
            harbor-cli-${{ matrix.target }}.tar.gz.sha256 \
            --clobber

  desktop:
    name: Desktop (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Build CLI for bundling (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --release --target aarch64-apple-darwin -p harbor-cli
          cargo build --release --target x86_64-apple-darwin -p harbor-cli
          mkdir -p crates/harbor-desktop/binaries
          lipo -create \
            target/aarch64-apple-darwin/release/harbor \
            target/x86_64-apple-darwin/release/harbor \
            -output crates/harbor-desktop/binaries/harbor

      - name: Build CLI for bundling (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu -p harbor-cli
          mkdir -p crates/harbor-desktop/binaries
          cp target/x86_64-unknown-linux-gnu/release/harbor crates/harbor-desktop/binaries/harbor

      - name: Build CLI for bundling (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p harbor-cli
          mkdir -p crates/harbor-desktop/binaries
          cp target/x86_64-pc-windows-msvc/release/harbor.exe crates/harbor-desktop/binaries/harbor
        shell: bash

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HARBOR_GITHUB_CLIENT_ID: ${{ secrets.HARBOR_GITHUB_CLIENT_ID }}
          HARBOR_GITHUB_CLIENT_SECRET: ${{ secrets.HARBOR_GITHUB_CLIENT_SECRET }}
          HARBOR_GOOGLE_CLIENT_ID: ${{ secrets.HARBOR_GOOGLE_CLIENT_ID }}
          HARBOR_GOOGLE_CLIENT_SECRET: ${{ secrets.HARBOR_GOOGLE_CLIENT_SECRET }}
          HARBOR_SLACK_CLIENT_ID: ${{ secrets.HARBOR_SLACK_CLIENT_ID }}
          HARBOR_SLACK_CLIENT_SECRET: ${{ secrets.HARBOR_SLACK_CLIENT_SECRET }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          tauriScript: npx tauri
          projectPath: crates/harbor-desktop
          args: --target ${{ matrix.target }}

  publish-release:
    name: Publish Release
    needs: [create-release, cli, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v6
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false
            })
