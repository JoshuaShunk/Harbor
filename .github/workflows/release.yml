name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          HARBOR_GITHUB_CLIENT_ID: ${{ secrets.HARBOR_GITHUB_CLIENT_ID }}
          HARBOR_GITHUB_CLIENT_SECRET: ${{ secrets.HARBOR_GITHUB_CLIENT_SECRET }}
          HARBOR_GOOGLE_CLIENT_ID: ${{ secrets.HARBOR_GOOGLE_CLIENT_ID }}
          HARBOR_GOOGLE_CLIENT_SECRET: ${{ secrets.HARBOR_GOOGLE_CLIENT_SECRET }}
          HARBOR_SLACK_CLIENT_ID: ${{ secrets.HARBOR_SLACK_CLIENT_ID }}
          HARBOR_SLACK_CLIENT_SECRET: ${{ secrets.HARBOR_SLACK_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Harbor ${{ github.ref_name }}"
          releaseBody: "See the assets below to download Harbor for your platform."
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          projectPath: crates/harbor-desktop
          args: --target ${{ matrix.target }}
